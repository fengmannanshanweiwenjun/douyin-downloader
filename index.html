<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音无水印下载</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--accent:#fe2c55;--accent2:#25f4ee;--text:#e8e8ed;--text2:#8b8b9e;--radius:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(254,44,85,.06) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(37,244,238,.04) 0%,transparent 50%);animation:bgShift 20s ease-in-out infinite alternate;z-index:-1}
@keyframes bgShift{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(-5%,-5%) rotate(3deg)}}
.container{width:100%;max-width:680px;padding:40px 20px 60px}
.header{text-align:center;margin-bottom:48px}
.logo{font-size:48px;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(254,44,85,.3))}
.header h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.header p{color:var(--text2);font-size:15px}
.input-group{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:6px;display:flex;gap:6px;transition:border-color .3s}
.input-group:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(254,44,85,.1)}
.input-group input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;padding:14px 16px;min-width:0}
.input-group input::placeholder{color:var(--text2)}
.btn-parse{background:linear-gradient(135deg,var(--accent),#ff6b8a);color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;position:relative;overflow:hidden}
.btn-parse:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(254,44,85,.3)}
.btn-parse:active{transform:translateY(0)}
.btn-parse:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
.btn-parse .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.btn-parse.loading .spinner{display:inline-block}
.btn-parse.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.tip{text-align:center;color:var(--text2);font-size:13px;margin-top:16px;line-height:1.6}
.error-msg{background:rgba(254,44,85,.1);border:1px solid rgba(254,44,85,.2);border-radius:12px;padding:14px 18px;color:#ff6b8a;font-size:14px;margin-top:20px;display:none;animation:fadeIn .3s}
.result{margin-top:32px;display:none;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.preview-wrap{position:relative;background:#000;max-height:420px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.preview-wrap video,.preview-wrap img{max-width:100%;max-height:420px;object-fit:contain}
.preview-badge{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);color:#fff;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;display:flex;align-items:center;gap:5px}
.info{padding:20px}
.info-title{font-size:16px;font-weight:600;line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.info-author{color:var(--text2);font-size:13px;margin-bottom:4px}
.info-note{color:var(--accent2);font-size:12px;margin-bottom:16px;opacity:.8}
.images-carousel{display:flex;gap:8px;overflow-x:auto;padding:0 20px 16px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.images-carousel::-webkit-scrollbar{height:4px}
.images-carousel::-webkit-scrollbar-track{background:transparent}
.images-carousel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.images-carousel img{height:200px;border-radius:10px;scroll-snap-align:start;flex-shrink:0;cursor:pointer;transition:transform .2s}
.images-carousel img:hover{transform:scale(1.02)}
.download-actions{padding:0 20px 20px;display:flex;gap:10px;flex-wrap:wrap}
.btn-download{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-download.primary{background:linear-gradient(135deg,var(--accent),#ff6b8a);color:#fff}
.btn-download.primary:hover{box-shadow:0 8px 25px rgba(254,44,85,.3);transform:translateY(-1px)}
.btn-download.secondary{background:rgba(37,244,238,.1);color:var(--accent2);border:1px solid rgba(37,244,238,.2)}
.btn-download.secondary:hover{background:rgba(37,244,238,.15)}
.btn-download.all{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--border)}
.btn-download.all:hover{background:rgba(255,255,255,.08)}
.help{margin-top:48px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.help h3{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.help-steps{display:flex;flex-direction:column;gap:14px}
.help-step{display:flex;gap:14px;align-items:flex-start}
.step-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-text{font-size:14px;color:var(--text2);line-height:1.6;padding-top:3px}
.step-text strong{color:var(--text)}
.history{margin-top:24px}
.history-title{font-size:14px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.history-clear{background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s}
.history-clear:hover{background:rgba(255,255,255,.05);color:var(--text)}
.history-list{display:flex;flex-direction:column;gap:6px}
.history-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-item:hover{border-color:var(--accent);color:var(--text)}
.footer{text-align:center;padding:40px 20px;color:var(--text2);font-size:12px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);backdrop-filter:blur(10px);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:480px){.container{padding:24px 16px 40px}.header h1{font-size:22px}.logo{font-size:40px}.btn-parse{padding:12px 20px}.download-actions{flex-direction:column}.btn-download{justify-content:center}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">🎵</div>
    <h1>抖音无水印下载</h1>
    <p>支持视频 · 图文 · 一键保存到本地</p>
  </div>
  <div class="input-group">
    <input type="text" id="urlInput" placeholder="粘贴抖音分享链接或分享文字..." autocomplete="off" spellcheck="false">
    <button class="btn-parse" id="parseBtn" onclick="doParse()">
      <span class="btn-text">解析</span>
      <span class="spinner"></span>
    </button>
  </div>
  <div class="tip">打开抖音 → 分享 → 复制链接 → 粘贴到上方</div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="result" id="result">
    <div class="result-card">
      <div class="preview-wrap" id="previewWrap"></div>
      <div class="info" id="infoSection"></div>
      <div class="images-carousel" id="imagesCarousel"></div>
      <div class="download-actions" id="downloadActions"></div>
    </div>
  </div>
  <div class="help">
    <h3>📖 使用说明</h3>
    <div class="help-steps">
      <div class="help-step"><div class="step-num">1</div><div class="step-text">打开抖音 App，找到想下载的视频或图文</div></div>
      <div class="help-step"><div class="step-num">2</div><div class="step-text">点击 <strong>分享</strong> → <strong>复制链接</strong></div></div>
      <div class="help-step"><div class="step-num">3</div><div class="step-text">粘贴到上方输入框，点击 <strong>解析</strong></div></div>
      <div class="help-step"><div class="step-num">4</div><div class="step-text">预览后点击 <strong>下载</strong>，视频/图片将保存到本地</div></div>
    </div>
  </div>
  <div class="history" id="historySection" style="display:none">
    <div class="history-title"><span>📋 最近解析</span><button class="history-clear" onclick="clearHistory()">清空</button></div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>
<div class="footer">仅供个人学习使用 · 请尊重创作者版权</div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const urlInput = $('urlInput');
const parseBtn = $('parseBtn');
const PROXY = 'https://corsproxy.io/?';

// 回车解析
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') doParse(); });
urlInput.focus();

// 从分享文本中提取链接
function extractUrl(text) {
  const m = text.match(/https?:\/\/[^\s<>"']+/);
  return m ? m[0] : text.trim();
}

// 跟随短链重定向获取真实URL（通过proxy）
async function resolveRedirect(shortUrl) {
  // 用 r.jina.ai 获取重定向后的页面内容（免费、无需key）
  const rjinaUrl = 'https://r.jina.ai/' + shortUrl;
  const resp = await fetch(PROXY + encodeURIComponent(rjinaUrl), {
    headers: { 'Accept': 'text/plain' }
  });
  const text = await resp.text();
  return text;
}

// 从页面HTML或文本中提取视频ID
function extractVideoId(text) {
  // 匹配各种格式的视频ID
  const patterns = [
    /video[/](\d{15,})/,
    /modal_id=(\d{15,})/,
    /aweme_id=(\d{15,})/,
    /"awemeId":"(\d{15,})"/,
    /itemId['":\s]+['"]?(\d{15,})/,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m) return m[1];
  }
  return null;
}

// 从页面提取所有图片URL
function extractImageUrls(text) {
  const urls = new Set();
  // douyin 图片CDN模式
  const patterns = [
    /https?:\/\/p\d+-sign\.douyinpic\.com\/[^"'\s<>]+/g,
    /https?:\/\/p\d+\.douyinpic\.com\/[^"'\s<>]+/g,
    /https?:\/\/[a-z\d-]+\.byteimg\.com\/[^"'\s<>]+/g,
  ];
  for (const p of patterns) {
    let m;
    while ((m = p.exec(text)) !== null) {
      let url = m[0].replace(/\\u002F/g, '/').replace(/\\\//g, '/');
      // 去掉尾部转义
      url = url.replace(/%5C/g, '');
      if (url.length > 50) urls.add(url);
    }
  }
  return [...urls];
}

// 从页面提取视频播放URL
function extractVideoUrl(text) {
  // 尝试提取 play_addr
  const patterns = [
    /"play_addr":\s*\{[^}]*"url_list":\s*\["([^"]+)"/,
    /playApi['":\s]+['"]([^'"]+\.mp4[^'"]*)['"]/,
    /"src":"(https?:\/\/[^"]+\.mp4[^"]*)"/,
    /https?:\/\/v\d+-[a-z]+\.douyinpic\.com\/[^"'\s<>]*video[^"'\s<>]*/g,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m) {
      let url = m[1] || m[0];
      url = url.replace(/\\u002F/g, '/').replace(/\\\//g, '/');
      if (url.startsWith('http')) return url;
    }
  }
  return null;
}

// 提取标题
function extractTitle(text) {
  const patterns = [
    /"desc":"([^"]+)"/,
    /"title":"([^"]+)"/,
    /<title>([^<]+)<\/title>/,
    /og:title['"]\s*content=['"]([^'"]+)/,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m && m[1] && m[1].length > 1) return m[1].replace(/\\u[\da-f]{4}/gi, '');
  }
  return '抖音作品';
}

// 提取作者
function extractAuthor(text) {
  const patterns = [
    /"nickname":"([^"]+)"/,
    /"author":"([^"]+)"/,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m && m[1]) return m[1].replace(/\\u[\da-f]{4}/gi, '');
  }
  return '';
}

// 主解析流程
async function doParse() {
  const raw = urlInput.value.trim();
  if (!raw) { showError('请先粘贴抖音链接'); urlInput.focus(); return; }

  const url = extractUrl(raw);
  hideError();
  $('result').style.display = 'none';
  parseBtn.disabled = true;
  parseBtn.classList.add('loading');

  try {
    showToast('正在解析链接...');

    // Step 1: 获取页面内容
    let pageContent = '';
    let videoId = null;

    // 先尝试直接从链接提取ID
    videoId = extractVideoId(url);

    if (!videoId) {
      // 短链需要解析
      showToast('正在获取作品信息...');
      pageContent = await resolveRedirect(url);
      videoId = extractVideoId(pageContent);
    }

    if (!videoId) throw new Error('无法提取作品ID，请确认链接正确');

    // Step 2: 获取作品详情页
    showToast('正在提取下载地址...');
    const detailUrl = `https://www.douyin.com/video/${videoId}`;
    let detailContent = pageContent;
    if (!detailContent || !detailContent.includes(videoId)) {
      detailContent = await resolveRedirect(detailUrl);
    }

    // Step 3: 提取信息
    const title = extractTitle(detailContent);
    const author = extractAuthor(detailContent);
    const images = extractImageUrls(detailContent);
    const videoUrl = extractVideoUrl(detailContent);

    // 去重图片（按域名+路径去重）
    const uniqueImages = [...new Set(images.map(u => u.split('?')[0]))].map(base => {
      return images.find(u => u.startsWith(base)) || base;
    });

    const result = {
      type: 'unknown',
      title,
      author,
      videoUrl: videoUrl ? (videoUrl.includes('playwm') ? videoUrl.replace('playwm', 'play') : videoUrl) : '',
      images: uniqueImages,
      cover: '',
      videoId,
    };

    if (result.videoUrl) {
      result.type = 'video';
      result.cover = detailContent.match(/"cover":\s*\{[^}]*"url_list":\s*\["([^"]+)"/)?.[1] || '';
    } else if (result.images.length > 0) {
      result.type = 'images';
      result.cover = result.images[0];
    } else {
      // 尝试备用方案：用 r.jina.ai 的纯文本提取
      throw new Error('未能提取到下载地址。抖音可能限制了访问，建议稍后再试');
    }

    renderResult(result);
    saveHistory(raw, result);
    showToast('✅ 解析成功');

  } catch (err) {
    console.error(err);
    showError(err.message || '解析失败，请稍后重试');
  } finally {
    parseBtn.disabled = false;
    parseBtn.classList.remove('loading');
  }
}

// 通过代理下载文件
function proxiedUrl(url) {
  return PROXY + encodeURIComponent(url);
}

// 渲染结果
function renderResult(data) {
  const previewWrap = $('previewWrap');
  const infoSection = $('infoSection');
  const imagesCarousel = $('imagesCarousel');
  const downloadActions = $('downloadActions');

  if (data.type === 'video') {
    previewWrap.innerHTML = `
      <video src="${proxiedUrl(data.videoUrl)}" controls playsinline preload="metadata" poster="${data.cover ? proxiedUrl(data.cover) : ''}" style="width:100%"></video>
      <div class="preview-badge">🎬 视频 · 无水印</div>`;
  } else {
    const firstImg = data.images[0];
    previewWrap.innerHTML = `
      <img src="${proxiedUrl(firstImg)}" alt="预览">
      <div class="preview-badge">📷 图文 · ${data.images.length}张</div>`;
  }

  infoSection.innerHTML = `
    <div class="info-title">${esc(data.title)}</div>
    <div class="info-author">${data.author ? '@' + esc(data.author) : ''}</div>
    <div class="info-note">💡 下载按钮使用代理中转，如遇失败请多试几次</div>`;

  // 图片轮播
  if (data.type === 'images' && data.images.length > 1) {
    imagesCarousel.style.display = 'flex';
    imagesCarousel.innerHTML = data.images.map((img, i) =>
      `<img src="${proxiedUrl(img)}" alt="图${i+1}" onclick="downloadImg('${escAttr(img)}','${escAttr(data.title)}_${i+1}')">`
    ).join('');
  } else {
    imagesCarousel.style.display = 'none';
  }

  // 下载按钮
  let btns = '';
  if (data.type === 'video') {
    btns = `<button class="btn-download primary" onclick="downloadVideo('${escAttr(data.videoUrl)}','${escAttr(data.title)}')">⬇️ 下载视频 (无水印)</button>`;
  } else {
    btns = `<button class="btn-download primary" onclick="downloadAllImages()">⬇️ 下载全部图片 (${data.images.length}张)</button>`;
    data.images.forEach((img, i) => {
      btns += `<button class="btn-download secondary" onclick="downloadImg('${escAttr(img)}','${escAttr(data.title)}_${i+1}')">图 ${i+1}</button>`;
    });
  }
  if (data.cover) {
    btns += `<button class="btn-download all" onclick="downloadImg('${escAttr(data.cover)}','${escAttr(data.title)}_封面')">🖼️ 封面</button>`;
  }
  downloadActions.innerHTML = btns;
  downloadActions.dataset.images = JSON.stringify(data.images);
  downloadActions.dataset.title = data.title;

  $('result').style.display = 'block';
  $('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// 下载视频（通过代理）
async function downloadVideo(url, name) {
  showToast('正在准备下载...');
  try {
    const resp = await fetch(proxiedUrl(url));
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (name || 'douyin_video') + '.mp4';
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('✅ 下载已开始');
  } catch (e) {
    // 备用：直接在新窗口打开
    window.open(proxiedUrl(url), '_blank');
    showToast('已在新窗口打开，右键可保存');
  }
}

// 下载单张图片
async function downloadImg(url, name) {
  try {
    const resp = await fetch(proxiedUrl(url));
    const blob = await resp.blob();
    const ext = blob.type.includes('png') ? '.png' : '.jpg';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (name || 'douyin_img') + ext;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) {
    window.open(proxiedUrl(url), '_blank');
  }
}

// 批量下载图片
async function downloadAllImages() {
  const actions = $('downloadActions');
  const images = JSON.parse(actions.dataset.images || '[]');
  const title = actions.dataset.title || 'douyin';
  showToast(`正在下载 ${images.length} 张图片...`);
  for (let i = 0; i < images.length; i++) {
    await downloadImg(images[i], `${title}_${i + 1}`);
    if (i < images.length - 1) await new Promise(r => setTimeout(r, 600));
  }
  showToast('✅ 全部下载完成');
}

// 历史记录
function saveHistory(url, data) {
  let h = JSON.parse(localStorage.getItem('dy_history') || '[]');
  h.unshift({ url, title: data.title, type: data.type, time: Date.now() });
  h = h.slice(0, 20);
  localStorage.setItem('dy_history', JSON.stringify(h));
  renderHistory();
}
function renderHistory() {
  const h = JSON.parse(localStorage.getItem('dy_history') || '[]');
  const sec = $('historySection');
  const list = $('historyList');
  if (!h.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = h.map(i =>
    `<div class="history-item" onclick="urlInput.value='${escAttr(i.url)}';doParse();window.scrollTo({top:0,behavior:'smooth'})">${i.type==='video'?'🎬':'📷'} ${esc(i.title)}</div>`
  ).join('');
}
function clearHistory() { localStorage.removeItem('dy_history'); renderHistory(); }

// 工具
function showError(msg) { const e = $('errorMsg'); e.textContent = msg; e.style.display = 'block'; }
function hideError() { $('errorMsg').style.display = 'none'; }
function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function escAttr(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function showToast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500); }

renderHistory();
</script>
</body>
</html>
